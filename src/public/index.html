<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Service</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        h1 { color: #333; margin-bottom: 30px; }
        nav { display: flex; gap: 20px; }

        .btn-login { background-color: #28a745; }
        .btn-profile { background-color: #6c757d; }
    </style>
</head>
<body>
<h1>Authentication System</h1>
<nav>
    <a href="/register.html" class="btn btn-register">Register</a>
    <a href="/login.html" class="btn btn-login">Login</a>

</nav>
</body>
</html>
